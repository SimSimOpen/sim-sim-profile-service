services:
  profile-service:
    image: ghcr.io/simsimopen/sim-sim-profile-service:latest
    container_name: profile-service
    env_file:
      - .env
    environment:
      - TZ=Asia/Tashkent
      - SPRING_PROFILES_ACTIVE=prod
    command: [
      "java",
      "-Duser.timezone=Asia/Tashkent",
      "-Xms128m",
      "-Xmx384m",
      "-XX:+UseG1GC",
      "-XX:MaxGCPauseMillis=200",
      "-jar",
      "app.jar"
    ]
    deploy:
      resources:
        limits:
          cpus: '1.0'          # Limit to 1 CPU core
          memory: 512M         # Hard limit (container killed if exceeded)
        reservations:
          cpus: '0.5'          # Guaranteed CPU allocation
          memory: 256M
    restart: always
    networks:
      - simsim
networks:
  simsim:
    name: simsim
    external: true